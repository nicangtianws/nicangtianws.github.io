  <ul class="post-tags-list" itemprop="keywords"><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/algorithm/" rel="tag">algorithm</a></li><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/java/" rel="tag">java</a></li><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/quick-sort/" rel="tag">quick sort</a></li><li class="post-tags-list-item"><a class="post-tags-list-link" href="/tags/sort-algorithm/" rel="tag">sort algorithm</a></li></ul>

            <h1 id="快速排序"><a href="#快速排序" class="headerlink" title="快速排序"></a>快速排序</h1><p>基本思想：快速排序采用分治思想，首先找一个基准值（一般使用第一个数作为基准值）赋值给临时变量，然后从右往左找大于基准值的数放到左边，再从左往右找<strong>小于等于</strong>基准值的数放到右边，最后将临时变量放到i和j重合的位置上。最后对上述过程进行递归调用，再分别排序基准值左边跟右边的数，直到低位光标<strong>大于等于</strong>高位光标时直接返回数组。</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">QuickSort</span> </span>&#123;</span><br><span class="line">    <span class="keyword">public</span> <span class="keyword">int</span>[] quickSort(<span class="keyword">int</span>[] a,<span class="keyword">int</span> low,<span class="keyword">int</span> high)&#123;</span><br><span class="line">        <span class="keyword">int</span>[] arr = a;</span><br><span class="line">        <span class="comment">//如果光标已经重合就直接返回</span></span><br><span class="line">        <span class="keyword">if</span>(low &gt; high)&#123;</span><br><span class="line">            <span class="keyword">return</span> arr;</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="comment">//将第一个值赋值给临时变量作为基准值</span></span><br><span class="line">        <span class="keyword">int</span> temp = a[low];</span><br><span class="line">        <span class="keyword">int</span> i = low;</span><br><span class="line">        <span class="keyword">int</span> j = high;</span><br><span class="line"></span><br><span class="line">        <span class="comment">//如果i &lt; j就执行查找</span></span><br><span class="line">        <span class="keyword">while</span>(i &lt; j)&#123;</span><br><span class="line">            <span class="comment">//因为基准值在左边，所以先从右往左找大于基准值的数</span></span><br><span class="line">            <span class="keyword">while</span> (i &lt;= j &amp;&amp; arr[j] &gt; temp)&#123;</span><br><span class="line">                j--;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="comment">//将大于基准值的数放到左边</span></span><br><span class="line">            arr[i] = arr[j];</span><br><span class="line">            <span class="comment">//查找小于基准值的数</span></span><br><span class="line">            <span class="keyword">while</span> (i &lt; j &amp;&amp; arr[i] &lt; temp)&#123;</span><br><span class="line">                i++;</span><br><span class="line">            &#125;</span><br><span class="line">            <span class="comment">//将小于基准值的数放到右边</span></span><br><span class="line">            arr[j] = arr[i];</span><br><span class="line">        &#125;</span><br><span class="line"></span><br><span class="line">        <span class="comment">//将基准值放入i，j重合位置</span></span><br><span class="line">        arr[i] = temp;</span><br><span class="line">        <span class="comment">//递归调用对左边进行排序</span></span><br><span class="line">        quickSort(arr,low,i - <span class="number">1</span>);</span><br><span class="line">        <span class="comment">//递归调用对右边进行排序</span></span><br><span class="line">        quickSort(arr,i + <span class="number">1</span>,high);</span><br><span class="line"></span><br><span class="line">        <span class="keyword">return</span> arr;</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="meta">@Test</span></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">testQuickSort</span><span class="params">()</span></span>&#123;</span><br><span class="line">        <span class="keyword">int</span>[] a = <span class="keyword">new</span> <span class="keyword">int</span>[]&#123;<span class="number">3</span>,<span class="number">5</span>,<span class="number">6</span>,<span class="number">11</span>,<span class="number">65</span>,<span class="number">1</span>,<span class="number">9</span>,<span class="number">30</span>&#125;;</span><br><span class="line">        <span class="keyword">int</span>[] rs = quickSort(a,<span class="number">0</span>,a.length - <span class="number">1</span>);</span><br><span class="line">        <span class="keyword">assert</span> rs.length &gt; <span class="number">0</span>;</span><br><span class="line">        <span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>;i &lt; rs.length;i++)&#123;</span><br><span class="line">            System.out.println(rs[i]);</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
