is</span>.status === <span class="number">200</span>) &#123;</span><br><span class="line">                <span class="keyword">var</span> fileName = <span class="keyword">this</span>.getResponseHeader(<span class="string">"Content-Disposition"</span>);</span><br><span class="line">                <span class="keyword">var</span> blob = <span class="keyword">this</span>.response;</span><br><span class="line">                <span class="keyword">var</span> reader = <span class="keyword">new</span> FileReader();</span><br><span class="line">                reader.readAsDataURL(blob);</span><br><span class="line">                reader.onload = <span class="function"><span class="keyword">function</span>(<span class="params">e</span>) </span>&#123;</span><br><span class="line">                    <span class="keyword">var</span> a = <span class="built_in">document</span>.createElement(<span class="string">'a'</span>);</span><br><span class="line">                    a.download = fileName;</span><br><span class="line">                    a.href = e.target.result;</span><br><span class="line">                    $(<span class="string">'body'</span>).append(a);</span><br><span class="line">                    a.click();</span><br><span class="line">                    a.remove();</span><br><span class="line">                &#125;</span><br><span class="line">            &#125;</span><br><span class="line">        &#125;;</span><br><span class="line">        <span class="comment">//请求完成关闭遮罩层</span></span><br><span class="line">        xhr.onloadend = <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</span><br><span class="line">            closeMask();</span><br><span class="line">        &#125;;</span><br><span class="line">        <span class="comment">//设置请求头</span></span><br><span class="line">        xhr.setRequestHeader(<span class="string">'Content-Type'</span>,<span class="string">'application/x-www-form-urlencoded'</span>);</span><br><span class="line">        <span class="comment">//发送请求</span></span><br><span class="line">        xhr.send(data);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="comment">//将数据对象格式化伪FormData</span></span><br><span class="line">    <span class="function"><span class="keyword">function</span> <span class="title">encodeFormData</span>(<span class="params">data</span>)</span>&#123;</span><br><span class="line">        <span class="keyword">if</span>(!data) <span class="keyword">return</span> <span class="string">''</span>;</span><br><span class="line">        <span class="keyword">var</span> pairs = [];</span><br><span class="line">        <span class="keyword">for</span>(<span class="keyword">var</span> name <span class="keyword">in</span> data)&#123;</span><br><span class="line">            <span class="keyword">if</span>(!data.hasOwnProperty(name)) <span class="keyword">continue</span>;</span><br><span class="line">            <span class="keyword">if</span>(<span class="keyword">typeof</span> data[name] === <span class="string">'function'</span>) <span class="keyword">continue</span>;</span><br><span class="line">            <span class="keyword">var</span> value = data[name].toString();</span><br><span class="line">            name = <span class="built_in">encodeURIComponent</span>(name.replace(<span class="string">'%20'</span>,<span class="string">'+'</span>));</span><br><span class="line">            value = <span class="built_in">encodeURIComponent</span>(value.replace(<span class="string">'%20'</span>,<span class="string">'+'</span>));</span><br><span class="line">            pairs.push(name+<span class="string">'='</span>+value);</span><br><span class="line">        &#125;</span><br><span class="line">        <span class="keyword">return</span> pairs.join(<span class="string">'&amp;'</span>);</span><br><span class="line">    &#125;</span><br><span class="line">&lt;<span class="regexp">/script&g
